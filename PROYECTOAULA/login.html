<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SportFet - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1e3c72;
            --primary-dark: #0f2744;
            --primary-light: #2a4d8a;
            --secondary: #f39c12;
            --secondary-dark: #e67e22;
            --accent: #e74c3c;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f1c40f;
            --info: #3498db;
            --gray-600: #6c757d;
            --gray-800: #343a40;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            padding: 12px 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand {
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--primary) !important;
        }

        .navbar-brand span {
            color: var(--secondary);
        }

        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 60px;
        }

        .auth-card {
            background: white;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            overflow: hidden;
            max-width: 500px;
            width: 100%;
        }

        .form-panel {
            padding: 50px 40px;
            background: white;
        }

        .form-panel h3 {
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 30px;
            font-size: 1.8rem;
        }

        .form-panel h3 i {
            color: var(--secondary);
            margin-right: 10px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            font-weight: 600;
            color: var(--gray-800);
            margin-bottom: 8px;
            display: block;
        }

        .form-group label i {
            margin-right: 8px;
            color: var(--primary);
        }

        .form-control {
            border: 2px solid #dee2e6;
            border-radius: 16px;
            padding: 14px 18px;
            font-size: 1rem;
            width: 100%;
        }

        .form-control:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(30,60,114,0.1);
        }

        .btn-auth {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 16px;
            padding: 14px;
            font-weight: 700;
            width: 100%;
            color: white;
            transition: all 0.3s;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(30,60,114,0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 2px solid #dee2e6;
        }

        .divider span {
            padding: 0 15px;
            color: var(--gray-600);
        }

        .auth-link {
            text-align: center;
            margin-top: 25px;
        }

        .auth-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-link a:hover {
            color: var(--secondary);
        }

        .alert-custom {
            border-radius: 16px;
            padding: 12px 18px;
            margin-bottom: 20px;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: var(--secondary);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast-custom {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1100;
            min-width: 280px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        @media (max-width: 768px) {
            .form-panel {
                padding: 30px 25px;
            }
            .form-panel h3 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-futbol me-2"></i>Sport<span>Fet</span></a>
        </div>
    </nav>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <p class="text-white mt-3">Cargando...</p>
    </div>

    <div class="auth-container" id="mainContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBomIv1aFwlVtHxkKz-kboH58Bs98S_idg",
            authDomain: "neivaconnect-marketplace.firebaseapp.com",
            projectId: "neivaconnect-marketplace",
            storageBucket: "neivaconnect-marketplace.firebasestorage.app",
            messagingSenderId: "872541057568",
            appId: "1:872541057568:web:fa8d50b159222bd394c245",
            measurementId: "G-FN2C602RHZ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }

        function showToast(message, type = 'success') {
            const existing = document.querySelector('.toast-custom');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast-custom alert alert-${type === 'success' ? 'success' : type === 'danger' ? 'danger' : 'info'} shadow-lg`;
            toast.innerHTML = `
                <div class="d-flex align-items-center p-3">
                    <i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'danger' ? 'fa-exclamation-circle' : 'fa-info-circle'} me-3 fa-lg"></i>
                    <div class="flex-grow-1">${message}</div>
                    <button type="button" class="btn-close" onclick="this.closest('.toast-custom').remove()"></button>
                </div>
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        async function registerUser(email, password, name) {
            showLoading(true);
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                
                await setDoc(doc(db, "users", userCredential.user.uid), {
                    name: name,
                    email: email,
                    role: 'user',
                    createdAt: new Date().toISOString()
                });
                
                showToast(`¡Bienvenido ${name}! Registro exitoso`, 'success');
                // Redirigir inmediatamente después de registrar
                window.location.href = 'parcial.html';
            } catch (error) {
                let message = 'Error al registrar';
                if (error.code === 'auth/email-already-in-use') message = 'El correo ya está registrado';
                else if (error.code === 'auth/weak-password') message = 'La contraseña debe tener al menos 6 caracteres';
                else if (error.code === 'auth/invalid-email') message = 'Correo inválido';
                showToast(message, 'danger');
            } finally {
                showLoading(false);
            }
        }

        async function loginUser(email, password) {
            showLoading(true);
            try {
                await signInWithEmailAndPassword(auth, email, password);
                showToast('Inicio de sesión exitoso', 'success');
                // Redirigir INMEDIATAMENTE a parcial.html
                window.location.href = 'parcial.html';
            } catch (error) {
                let message = 'Email o contraseña incorrectos';
                if (error.code === 'auth/too-many-requests') message = 'Demasiados intentos. Intenta más tarde';
                showToast(message, 'danger');
            } finally {
                showLoading(false);
            }
        }

        async function resetPassword(email) {
            showLoading(true);
            try {
                await sendPasswordResetEmail(auth, email);
                showToast('Enlace de recuperación enviado a tu correo', 'success');
                return true;
            } catch (error) {
                let message = 'Error al enviar recuperación';
                if (error.code === 'auth/user-not-found') message = 'No existe una cuenta con este correo';
                showToast(message, 'danger');
                return false;
            } finally {
                showLoading(false);
            }
        }

        function showLogin() {
            const container = document.getElementById('mainContainer');
            container.innerHTML = `
                <div class="auth-card">
                    <div class="form-panel">
                        <h3><i class="fas fa-sign-in-alt"></i> Iniciar Sesión</h3>
                        <div id="loginAlert"></div>
                        <form id="loginForm">
                            <div class="form-group">
                                <label><i class="fas fa-envelope"></i> Correo Electrónico</label>
                                <input type="email" class="form-control" id="loginEmail" placeholder="correo@ejemplo.com" required>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-lock"></i> Contraseña</label>
                                <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required>
                            </div>
                            <button type="submit" class="btn-auth">
                                <i class="fas fa-arrow-right-to-bracket me-2"></i>Ingresar
                            </button>
                        </form>
                        <div class="auth-link">
                            <a href="#" id="showRegisterBtn">¿No tienes cuenta? Regístrate</a>
                            <span class="mx-2">|</span>
                            <a href="#" id="showForgotBtn">¿Olvidaste tu contraseña?</a>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('loginForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                loginUser(email, password);
            });
            
            document.getElementById('showRegisterBtn').addEventListener('click', (e) => {
                e.preventDefault();
                showRegister();
            });
            
            document.getElementById('showForgotBtn').addEventListener('click', (e) => {
                e.preventDefault();
                showForgotPassword();
            });
        }

        function showRegister() {
            const container = document.getElementById('mainContainer');
            container.innerHTML = `
                <div class="auth-card">
                    <div class="form-panel">
                        <h3><i class="fas fa-user-plus"></i> Crear Cuenta</h3>
                        <div id="registerAlert"></div>
                        <form id="registerForm">
                            <div class="form-group">
                                <label><i class="fas fa-user"></i> Nombre Completo</label>
                                <input type="text" class="form-control" id="regName" placeholder="Tu nombre" required>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-envelope"></i> Correo Electrónico</label>
                                <input type="email" class="form-control" id="regEmail" placeholder="correo@ejemplo.com" required>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-lock"></i> Contraseña</label>
                                <input type="password" class="form-control" id="regPassword" placeholder="Mínimo 6 caracteres" required>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-check-circle"></i> Confirmar Contraseña</label>
                                <input type="password" class="form-control" id="regConfirmPassword" placeholder="Repite tu contraseña" required>
                            </div>
                            <button type="submit" class="btn-auth">
                                <i class="fas fa-user-plus me-2"></i>Registrarse
                            </button>
                        </form>
                        <div class="auth-link">
                            <a href="#" id="backToLoginBtn">¿Ya tienes cuenta? Inicia Sesión</a>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('registerForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const name = document.getElementById('regName').value;
                const email = document.getElementById('regEmail').value;
                const password = document.getElementById('regPassword').value;
                const confirm = document.getElementById('regConfirmPassword').value;
                
                if (password !== confirm) {
                    showToast('Las contraseñas no coinciden', 'danger');
                    return;
                }
                if (password.length < 6) {
                    showToast('La contraseña debe tener al menos 6 caracteres', 'danger');
                    return;
                }
                registerUser(email, password, name);
            });
            
            document.getElementById('backToLoginBtn').addEventListener('click', (e) => {
                e.preventDefault();
                showLogin();
            });
        }

        function showForgotPassword() {
            const container = document.getElementById('mainContainer');
            container.innerHTML = `
                <div class="auth-card">
                    <div class="form-panel">
                        <h3><i class="fas fa-key"></i> Recuperar Contraseña</h3>
                        <p class="text-muted mb-4">Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.</p>
                        <div id="forgotAlert"></div>
                        <form id="forgotForm">
                            <div class="form-group">
                                <label><i class="fas fa-envelope"></i> Correo Electrónico</label>
                                <input type="email" class="form-control" id="forgotEmail" placeholder="correo@ejemplo.com" required>
                            </div>
                            <button type="submit" class="btn-auth">
                                <i class="fas fa-paper-plane me-2"></i>Enviar Enlace
                            </button>
                        </form>
                        <div class="auth-link">
                            <a href="#" id="backToLoginFromForgotBtn">Volver a Iniciar Sesión</a>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('forgotForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('forgotEmail').value;
                await resetPassword(email);
            });
            
            document.getElementById('backToLoginFromForgotBtn').addEventListener('click', (e) => {
                e.preventDefault();
                showLogin();
            });
        }
        
        onAuthStateChanged(auth, (user) => {
            const urlParams = new URLSearchParams(window.location.search);
            const isLogout = urlParams.get('logout') === 'true';
    
            if (!isLogout && user) {
                window.location.href = 'parcial.html';
            } else {
                showLogin();
            }
        });
        async function logoutUser() {
            try {
                await auth.signOut();
                showToast('Sesión cerrada correctamente', 'success');
                showLogin();
            } catch (error) {
                console.error('Error al cerrar sesión:', error);
            }
        }
    </script>
</body>
</html>
