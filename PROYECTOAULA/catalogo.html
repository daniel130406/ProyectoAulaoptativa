<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPORTFET - Tienda Deportiva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1e3c72;
            --primary-dark: #0f2744;
            --primary-light: #2a4d8a;
            --secondary: #f39c12;
            --secondary-dark: #e67e22;
            --accent: #e74c3c;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f1c40f;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            padding-top: 80px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .navbar {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            padding: 12px 0;
            border-bottom: 3px solid var(--secondary);
        }
        
        .navbar-brand {
            font-weight: 700;
            font-size: 1.8rem;
            color: white !important;
        }
        
        .navbar-brand span {
            color: var(--secondary);
        }
        
        .hero-section {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1461896836934-ffe607ba8211?w=1200&h=400&fit=crop');
            background-size: cover;
            background-position: center;
            padding: 80px 0;
            border-radius: 20px;
            margin-bottom: 40px;
            color: white;
            text-align: center;
        }
        
        .hero-section h1 {
            font-size: 3rem;
            font-weight: 700;
        }
        
        .product-card {
            border: none;
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.4s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            height: 100%;
            background: white;
            position: relative;
        }
        
        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            z-index: 1;
        }
        
        .product-img {
            height: 220px;
            width: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }
        
        .product-card:hover .product-img {
            transform: scale(1.05);
        }
        
        .product-title {
            font-weight: 700;
            color: var(--primary);
            font-size: 1.1rem;
            height: 50px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        
        .product-price {
            font-weight: 800;
            color: var(--secondary-dark);
            font-size: 1.3rem;
        }
        
        .btn-add-cart {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: none;
            border-radius: 8px;
            padding: 10px;
            color: white;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s;
        }
        
        .btn-add-cart:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(30,60,114,0.3);
        }
        
        .btn-add-cart:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }
        
        .cart-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, var(--secondary), var(--secondary-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }
        
        .cart-float:hover {
            transform: scale(1.1);
        }
        
        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -450px;
            width: 450px;
            height: 100vh;
            background: white;
            z-index: 1001;
            transition: right 0.3s;
            padding: 20px;
            overflow-y: auto;
            box-shadow: -5px 0 30px rgba(0,0,0,0.2);
        }
        
        .cart-sidebar.open {
            right: 0;
        }
        
        .cart-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: none;
        }
        
        .cart-overlay.open {
            display: block;
        }
        
        .cart-item {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }
        
        .cart-item-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 10px;
            margin-right: 15px;
        }
        
        .cart-item-details {
            flex: 1;
        }
        
        .cart-item-title {
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .cart-item-price {
            color: var(--secondary-dark);
            font-weight: 700;
        }
        
        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }
        
        .cart-item-quantity button {
            width: 28px;
            height: 28px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .cart-item-quantity button:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .cart-item-remove {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s;
        }
        
        .cart-item-remove:hover {
            transform: scale(1.1);
        }
        
        .category-filter {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .category-btn {
            background: #f0f0f0;
            border: none;
            border-radius: 30px;
            padding: 8px 20px;
            margin: 5px;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .category-btn.active, .category-btn:hover {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
        }
        
        .search-box {
            margin-bottom: 30px;
        }
        
        .search-box input {
            border-radius: 50px;
            padding: 12px 20px;
            border: 2px solid #ddd;
            font-size: 1rem;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }
        
        .notification {
            position: fixed;
            top: 100px;
            right: 20px;
            z-index: 1100;
            min-width: 300px;
            border-radius: 10px;
            animation: slideIn 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .footer {
            background: #2c3e50;
            color: white;
            padding: 30px 0;
            margin-top: 50px;
            text-align: center;
        }
        
        .footer a {
            color: var(--secondary);
            text-decoration: none;
        }
        
        @media (max-width: 768px) {
            .cart-sidebar {
                width: 100%;
                right: -100%;
            }
            .hero-section h1 {
                font-size: 2rem;
            }
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 15px;
            }
        }
        
        .out-of-stock {
            opacity: 0.7;
            position: relative;
        }
        
        .out-of-stock::after {
            content: "AGOTADO";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            background: rgba(231,76,60,0.95);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            z-index: 10;
            white-space: nowrap;
        }
        
        .stock-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            z-index: 5;
        }
        
        .stock-low {
            background: var(--warning);
            color: #333;
        }
        
        .stock-out {
            background: var(--danger);
            color: white;
        }
        
        .stock-ok {
            background: var(--success);
            color: white;
        }
        
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .empty-cart {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        
        .empty-cart i {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        
        .btn-checkout {
            background: linear-gradient(135deg, var(--success), #219a52);
            border: none;
        }
        
        .btn-checkout:hover {
            background: linear-gradient(135deg, #219a52, var(--success));
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-futbol me-2"></i>SPORT<span>FET</span></a>

    <div class="container">

    <script type="module">
        // ==================== IMPORTAR FIREBASE ====================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getFirestore, 
            collection, 
            addDoc, 
            getDocs, 
            doc, 
            updateDoc, 
            query, 
            orderBy, 
            Timestamp,
            onSnapshot,
            where
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBomIv1aFwlVtHxkKz-kboH58Bs98S_idg",
            authDomain: "neivaconnect-marketplace.firebaseapp.com",
            projectId: "neivaconnect-marketplace",
            storageBucket: "neivaconnect-marketplace.firebasestorage.app",
            messagingSenderId: "872541057568",
            appId: "1:872541057568:web:fa8d50b159222bd394c245"
        };

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // ==================== VARIABLES GLOBALES ====================
        let products = [];
        let cart = [];
        let currentCategory = 'all';
        let searchTerm = '';
        let unsubscribeProducts = null;

        // ==================== FUNCIONES UTILITARIAS ====================
        function formatCOP(value) {
            return new Intl.NumberFormat('es-CO', { 
                style: 'currency', 
                currency: 'COP', 
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            }).format(value);
        }

        function showNotification(message, type = 'success') {
            const notif = document.createElement('div');
            notif.className = `alert alert-${type} notification`;
            notif.style.cssText = 'position: fixed; top: 100px; right: 20px; z-index: 9999; min-width: 300px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.2);';
            notif.innerHTML = `
                <div class="d-flex align-items-center justify-content-between">
                    <div>
                        <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'danger' ? 'exclamation-circle' : 'info-circle'} me-2"></i>
                        <span>${message}</span>
                    </div>
                    <button type="button" class="btn-close" onclick="this.parentElement.parentElement.remove()"></button>
                </div>
            `;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 4000);
        }

        // ==================== REGISTRAR VENTA EN FIRESTORE ====================
        async function registerSaleInFirestore(productId, quantity, productName, productPrice, total) {
            try {
                // Registrar en colección 'ventas'
                await addDoc(collection(db, 'ventas'), {
                    productId: productId,
                    productName: productName,
                    cantidad: quantity,
                    precioUnitario: productPrice,
                    subtotal: productPrice * quantity,
                    iva: (productPrice * quantity) * 0.19,
                    total: total,
                    metodoPago: 'tienda_online',
                    fecha: Timestamp.now(),
                    usuario: 'Cliente Web',
                    origen: 'catalogo'
                });
                
                // Registrar movimiento de salida
                await addDoc(collection(db, 'movimientos'), {
                    type: 'exit',
                    productId: productId,
                    productName: productName,
                    quantity: quantity,
                    reason: 'venta',
                    notes: 'Venta desde tienda online - Carrito de compras',
                    fecha: Timestamp.now(),
                    userEmail: 'cliente@web.com',
                    user: 'Cliente Web'
                });
                
                console.log(`✅ Venta registrada en Firestore: ${quantity} x ${productName}`);
                return true;
            } catch (error) {
                console.error('Error al registrar venta:', error);
                return false;
            }
        }

        // ==================== ACTUALIZAR STOCK EN FIRESTORE ====================
        async function updateProductStockInFirestore(productId, newStock) {
            try {
                const productRef = doc(db, 'productos', productId);
                await updateDoc(productRef, {
                    stock: newStock,
                    updatedAt: Timestamp.now()
                });
                return true;
            } catch (error) {
                console.error('Error al actualizar stock:', error);
                return false;
            }
        }

        // ==================== CARGAR PRODUCTOS DESDE FIRESTORE (TIEMPO REAL) ====================
        function loadProductsFromFirestore() {
            const loadingDiv = document.getElementById('loadingSpinner');
            const productsGrid = document.getElementById('productsGrid');
            
            if (unsubscribeProducts) unsubscribeProducts();
            
            const q = query(collection(db, 'productos'), orderBy('createdAt', 'desc'));
            
            unsubscribeProducts = onSnapshot(q, (snapshot) => {
                products = [];
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    products.push({ 
                        id: doc.id, 
                        ...data,
                        stock: data.stock || 0,
                        price: data.price || 0,
                        name: data.name || 'Producto',
                        category: data.category || 'General'
                    });
                });
                
                // Ocultar loading y mostrar productos
                loadingDiv.style.display = 'none';
                productsGrid.style.display = 'grid';
                
                // Renderizar todo
                renderCategories();
                renderProducts();
                updateCartUI();
                
                console.log(`📦 Productos cargados: ${products.length}`);
            }, (error) => {
                console.error('Error al cargar productos:', error);
                loadingDiv.innerHTML = '<div class="alert alert-danger">Error al cargar productos. Recarga la página.</div>';
                showNotification('Error al conectar con la base de datos', 'danger');
            });
        }

        // ==================== RENDERIZAR CATEGORÍAS ====================
        function renderCategories() {
            const categories = ['all', ...new Set(products.map(p => p.category).filter(c => c))];
            const container = document.getElementById('categoryButtons');
            container.innerHTML = '';
            
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `category-btn ${currentCategory === cat ? 'active' : ''}`;
                btn.textContent = cat === 'all' ? '🏆 Todos' : cat;
                btn.onclick = () => {
                    currentCategory = cat;
                    renderCategories();
                    renderProducts();
                };
                container.appendChild(btn);
            });
        }

        // ==================== RENDERIZAR PRODUCTOS ====================
        function renderProducts() {
            let filtered = [...products];
            
            if (currentCategory !== 'all') {
                filtered = filtered.filter(p => p.category === currentCategory);
            }
            
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filtered = filtered.filter(p => 
                    p.name?.toLowerCase().includes(term) || 
                    p.category?.toLowerCase().includes(term)
                );
            }
            
            const container = document.getElementById('productsGrid');
            container.innerHTML = '';
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="col-12 text-center py-5 bg-white rounded-3">
                        <i class="fas fa-futbol fa-3x text-muted mb-3"></i>
                        <h4>No hay productos disponibles</h4>
                        <p class="text-muted">Pronto tendremos más productos para ti</p>
                    </div>
                `;
                return;
            }
            
            filtered.forEach(product => {
                const isOutOfStock = product.stock === 0;
                const stockClass = isOutOfStock ? 'stock-out' : (product.stock <= 3 ? 'stock-low' : 'stock-ok');
                const stockText = isOutOfStock ? 'AGOTADO' : (product.stock <= 3 ? `¡Últimos ${product.stock}!` : `${product.stock} uds`);
                
                const card = document.createElement('div');
                card.className = `product-card ${isOutOfStock ? 'out-of-stock' : ''}`;
                card.innerHTML = `
                    <div class="stock-badge ${stockClass}">${stockText}</div>
                    <img src="${product.image || 'https://via.placeholder.com/300x200?text=SportFet'}" class="product-img" alt="${product.name}" onerror="this.src='https://via.placeholder.com/300x200?text=Producto'">
                    <div class="card-body p-3">
                        <h5 class="product-title">${product.name}</h5>
                        <p class="text-muted small mb-2"><i class="fas fa-tag me-1"></i>${product.category}</p>
                        <p class="text-muted small">${product.description?.substring(0, 60) || ''}${product.description?.length > 60 ? '...' : ''}</p>
                        <div class="d-flex justify-content-between align-items-center mb-3 mt-2">
                            <span class="product-price">${formatCOP(product.price)}</span>
                        </div>
                        ${!isOutOfStock ? `
                            <div class="d-flex gap-2 mb-2">
                                <button class="btn btn-sm btn-outline-secondary" onclick="window.changeQty('${product.id}', -1)">-</button>
                                <input type="number" id="qty-${product.id}" value="1" min="1" max="${product.stock}" class="form-control form-control-sm text-center" style="width: 60px;">
                                <button class="btn btn-sm btn-outline-secondary" onclick="window.changeQty('${product.id}', 1)">+</button>
                            </div>
                            <button class="btn-add-cart" onclick="window.addToCart('${product.id}')">
                                <i class="fas fa-cart-plus me-2"></i>Agregar al Carrito
                            </button>
                        ` : `
                            <button class="btn btn-secondary w-100" disabled>
                                <i class="fas fa-times-circle me-2"></i>Agotado
                            </button>
                        `}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // ==================== CAMBIAR CANTIDAD EN INPUT ====================
        window.changeQty = (productId, delta) => {
            const input = document.getElementById(`qty-${productId}`);
            if (!input) return;
            let newVal = parseInt(input.value) + delta;
            const product = products.find(p => p.id === productId);
            if (product) {
                newVal = Math.max(1, Math.min(newVal, product.stock));
            }
            input.value = newVal;
        };

        // ==================== AGREGAR AL CARRITO ====================
        window.addToCart = async (productId) => {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            const qtyInput = document.getElementById(`qty-${productId}`);
            const quantity = parseInt(qtyInput?.value || 1);
            
            if (quantity > product.stock) {
                showNotification('No hay suficiente stock disponible', 'danger');
                return;
            }
            
            // Verificar si ya está en el carrito
            const existingIndex = cart.findIndex(item => item.id === productId);
            
            if (existingIndex >= 0) {
                const newQty = cart[existingIndex].quantity + quantity;
                if (newQty > product.stock) {
                    showNotification('No hay suficiente stock', 'danger');
                    return;
                }
                cart[existingIndex].quantity = newQty;
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    image: product.image,
                    quantity: quantity
                });
            }
            
            // ACTUALIZAR STOCK EN FIRESTORE
            const newStock = product.stock - quantity;
            await updateProductStockInFirestore(productId, newStock);
            
            // Actualizar producto localmente
            product.stock = newStock;
            
            // REGISTRAR VENTA EN FIRESTORE
            const subtotal = product.price * quantity;
            const iva = subtotal * 0.19;
            const total = subtotal + iva;
            await registerSaleInFirestore(productId, quantity, product.name, product.price, total);
            
            // Guardar carrito en localStorage
            localStorage.setItem('sportCustomerCart', JSON.stringify(cart));
            
            // Actualizar UI
            updateCartUI();
            renderProducts();
            showNotification(`${quantity} x ${product.name} agregado al carrito`, 'success');
        };

        // ==================== ACTUALIZAR CANTIDAD EN CARRITO ====================
        window.updateCartQuantity = async (productId, delta) => {
            const itemIndex = cart.findIndex(item => item.id === productId);
            if (itemIndex === -1) return;
            
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            const newQty = cart[itemIndex].quantity + delta;
            
            if (newQty < 1) {
                window.removeFromCart(productId);
                return;
            }
            
            if (newQty > product.stock + cart[itemIndex].quantity) {
                showNotification('No hay suficiente stock', 'warning');
                return;
            }
            
            // Ajustar stock en Firestore
            const stockDelta = delta;
            const newStock = product.stock - stockDelta;
            await updateProductStockInFirestore(productId, newStock);
            product.stock = newStock;
            
            cart[itemIndex].quantity = newQty;
            localStorage.setItem('sportCustomerCart', JSON.stringify(cart));
            
            updateCartUI();
            renderProducts();
        };

        // ==================== ELIMINAR DEL CARRITO ====================
        window.removeFromCart = async (productId) => {
            const itemIndex = cart.findIndex(item => item.id === productId);
            if (itemIndex === -1) return;
            
            const item = cart[itemIndex];
            const product = products.find(p => p.id === productId);
            
            if (product) {
                // Devolver stock en Firestore
                const newStock = product.stock + item.quantity;
                await updateProductStockInFirestore(productId, newStock);
                product.stock = newStock;
            }
            
            cart.splice(itemIndex, 1);
            localStorage.setItem('sportCustomerCart', JSON.stringify(cart));
            
            updateCartUI();
            renderProducts();
            showNotification('Producto eliminado del carrito', 'info');
        };

        // ==================== VACIAR CARRITO ====================
        window.clearCart = async () => {
            if (cart.length === 0) return;
            
            // Devolver todo el stock
            for (const item of cart) {
                const product = products.find(p => p.id === item.id);
                if (product) {
                    const newStock = product.stock + item.quantity;
                    await updateProductStockInFirestore(item.id, newStock);
                    product.stock = newStock;
                }
            }
            
            cart = [];
            localStorage.removeItem('sportCustomerCart');
            updateCartUI();
            renderProducts();
            showNotification('Carrito vaciado', 'info');
        };

        // ==================== ACTUALIZAR UI DEL CARRITO ====================
        function updateCartUI() {
            const container = document.getElementById('cartItemsContainer');
            const countSpan = document.getElementById('cartCount');
            const subtotalSpan = document.getElementById('cartSubtotal');
            const shippingSpan = document.getElementById('cartShipping');
            const totalSpan = document.getElementById('cartTotal');
            
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            countSpan.textContent = totalItems;
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-shopping-cart"></i>
                        <p>Tu carrito está vacío</p>
                        <button class="btn btn-primary btn-sm" onclick="window.closeCart()">Seguir comprando</button>
                    </div>
                `;
                subtotalSpan.textContent = formatCOP(0);
                shippingSpan.textContent = formatCOP(0);
                totalSpan.textContent = formatCOP(0);
                return;
            }
            
            let subtotal = 0;
            container.innerHTML = '';
            
            cart.forEach(item => {
                subtotal += item.price * item.quantity;
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <img src="${item.image || 'https://via.placeholder.com/60'}" class="cart-item-img" onerror="this.src='https://via.placeholder.com/60'">
                    <div class="cart-item-details">
                        <div class="cart-item-title">${item.name}</div>
                        <div class="cart-item-price">${formatCOP(item.price)}</div>
                        <div class="cart-item-quantity">
                            <button onclick="window.updateCartQuantity('${item.id}', -1)">-</button>
                            <span class="mx-2">${item.quantity}</span>
                            <button onclick="window.updateCartQuantity('${item.id}', 1)">+</button>
                        </div>
                    </div>
                    <button class="cart-item-remove" onclick="window.removeFromCart('${item.id}')">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                `;
                container.appendChild(div);
            });
            
            const shipping = subtotal > 50000 ? 0 : 5000;
            const total = subtotal + shipping;
            
            subtotalSpan.textContent = formatCOP(subtotal);
            shippingSpan.innerHTML = shipping === 0 ? '<span class="text-success">Gratis</span>' : formatCOP(shipping);
            totalSpan.textContent = formatCOP(total);
        }

        // ==================== FINALIZAR COMPRA ====================
        window.checkout = () => {
            if (cart.length === 0) {
                showNotification('El carrito está vacío', 'warning');
                return;
            }
            
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const shipping = subtotal > 50000 ? 0 : 5000;
            const total = subtotal + shipping;
            
            let message = "🛍️ *PEDIDO SPORTFET* 🛍️%0A%0A";
            message += "*PRODUCTOS:*%0A";
            cart.forEach((item, index) => {
                message += `${index + 1}. ${item.name}%0A`;
                message += `   Cantidad: ${item.quantity} x ${formatCOP(item.price)} = ${formatCOP(item.price * item.quantity)}%0A%0A`;
            });
            message += `📦 *Subtotal:* ${formatCOP(subtotal)}%0A`;
            message += `🚚 *Envío:* ${shipping === 0 ? 'Gratis' : formatCOP(shipping)}%0A`;
            message += `💰 *TOTAL:* ${formatCOP(total)}%0A%0A`;
            message += "*DATOS DEL CLIENTE:*%0A";
            message += "Nombre: [Tu nombre completo]%0A";
            message += "Dirección: [Tu dirección de entrega]%0A";
            message += "Teléfono: [Tu número de contacto]%0A%0A";
            message += "🔸 *Entregar a partir de las 8:00 AM* 🔸";
            
            window.open(`https://api.whatsapp.com/send?phone=573170296998&text=${message}`, '_blank');
            
            // Limpiar carrito después de la compra (el stock ya se descontó al agregar)
            cart = [];
            localStorage.removeItem('sportCustomerCart');
            updateCartUI();
            window.closeCart();
            renderProducts();
            showNotification('¡Gracias por tu compra! Te contactaremos pronto por WhatsApp', 'success');
        };

        // ==================== FUNCIONES UI DEL CARRITO ====================
        window.openCart = () => {
            document.getElementById('cartSidebar').classList.add('open');
            document.getElementById('cartOverlay').classList.add('open');
        };
        
        window.closeCart = () => {
            document.getElementById('cartSidebar').classList.remove('open');
            document.getElementById('cartOverlay').classList.remove('open');
        };

        // ==================== EVENT LISTENERS ====================
        document.getElementById('cartButton')?.addEventListener('click', window.openCart);
        document.getElementById('closeCartBtn')?.addEventListener('click', window.closeCart);
        document.getElementById('cartOverlay')?.addEventListener('click', window.closeCart);
        document.getElementById('checkoutBtn')?.addEventListener('click', window.checkout);
        document.getElementById('clearCartBtn')?.addEventListener('click', window.clearCart);
        document.getElementById('searchInput')?.addEventListener('input', (e) => {
            searchTerm = e.target.value;
            renderProducts();
        });
        document.getElementById('adminLink')?.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'admin.html';
        });

        // ==================== CARGAR CARRITO GUARDADO ====================
        function loadSavedCart() {
            const savedCart = localStorage.getItem('sportCustomerCart');
            if (savedCart) {
                cart = JSON.parse(savedCart);
                updateCartUI();
            }
        }

        // ==================== INICIALIZAR ====================
        function init() {
            loadSavedCart();
            loadProductsFromFirestore();
        }
        
        // Hacer funciones globales
        window.changeQty = window.changeQty;
        window.addToCart = window.addToCart;
        window.updateCartQuantity = window.updateCartQuantity;
        window.removeFromCart = window.removeFromCart;
        window.clearCart = window.clearCart;
        window.checkout = window.checkout;
        window.openCart = window.openCart;
        window.closeCart = window.closeCart;
        
        // Iniciar
        init();
    </script>
</body>
</html>
